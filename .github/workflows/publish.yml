name: Publish data snapshot
# THE SINGLE deployer for this site. Refreshes data.json from the Google Sheet
# and deploys to GitHub Pages.
#
# IMPORTANT: this only works correctly if it is the ONLY workflow that deploys
# to Pages. Disable the auto-generated "static.yml" (Actions tab > that workflow
# > ... > Disable workflow) so the two can never race each other.
on:
  push:
    branches: [main]                 # <-- your code pushes deploy through here. Change to "master" if that's your default branch.
  workflow_dispatch:                 # manual "Run workflow" button
  repository_dispatch:               # the editor's "Publish now" button
    types: [rebuild]
  schedule:
    - cron: '*/30 * * * *'           # safety auto-refresh every 30 min (the editor's Publish button is instant)
permissions:
  contents: write                    # to commit the refreshed data.json
  pages: write                       # to deploy to Pages
  id-token: write                    # required by deploy-pages
# Only one Pages deploy at a time; a newer run cancels a stuck/older one so the
# queue can never jam on an "in progress deployment".
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # This must be the *currently active* Web app /exec URL.
      # Apps Script > Deploy > Manage deployments > (Web app) > copy "Web app URL".
      # Required on that deployment:  Execute as = Me ,  Who has access = Anyone
      # ----------------------------------------------------------------------
      - name: Fetch latest data from the Google Sheet (non-fatal)
        env:
          APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyUoOwvu32QbKPaLIueyJFFSqft0b7qoASYEImHE3Mj-kRBxphaLbm1yyuXigFfiDKDrw/exec"
        run: |
          set +e
          echo "Requesting data from Apps Script…"
          code=$(curl -sSL --max-time 60 -o data.fetched.json -w "%{http_code}" "$APPS_SCRIPT_URL")
          echo "HTTP status from Apps Script: $code"

          ok=0
          if [ "$code" = "200" ]; then
            python3 - <<'PY'
          import json, sys
          try:
              d = json.load(open("data.fetched.json"))
          except Exception as e:
              print("::error::Response was not JSON (most likely a Google login / permission / error page).")
              print("First 300 chars of what we received:")
              print(open("data.fetched.json", encoding="utf-8", errors="replace").read()[:300])
              sys.exit(1)
          if d.get("ok") is not True:
              print("::error::JSON received but missing ok:true — check the doGet payload.")
              sys.exit(1)
          print("OK — events:", len(d.get("events", [])), "people:", len(d.get("people", [])),
                "gallery:", len(d.get("gallery", [])), "hero:", len(d.get("hero", [])))
          PY
            [ $? -eq 0 ] && ok=1
          else
            echo "::error::Apps Script did not return 200 (got $code)."
            echo "  404 = the /exec URL above is stale (a new deployment was created) — paste the current one."
            echo "  401/403 = 'Who has access' is not set to Anyone."
          fi

          if [ "$ok" = "1" ]; then
            mv -f data.fetched.json data.json
            echo "data.json refreshed from the Sheet."
          else
            rm -f data.fetched.json
            if [ -f data.json ]; then
              echo "::warning::Could not refresh data — keeping the existing data.json and deploying anyway."
            else
              echo "::warning::Could not refresh data and no existing data.json present; deploying without it."
            fi
          fi
          # Never fail the job on a data hiccup — the site should still deploy.
          exit 0

      - name: Commit data.json if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data.json ]; then git add data.json; fi
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "chore: refresh data snapshot"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
