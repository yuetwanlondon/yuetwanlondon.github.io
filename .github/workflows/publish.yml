name: Refresh data snapshot
# This workflow ONLY refreshes data.json from the Google Sheet and commits it.
# It does NOT deploy. GitHub Pages is set to "Deploy from a branch", so every
# push to main (including this one's data.json commit) is published automatically
# by GitHub's own Pages builder. That removes the deploy-pages collision for good.
on:
  workflow_dispatch:                 # manual "Run workflow" button
  repository_dispatch:               # the editor's "Publish now" button
    types: [rebuild]
  schedule:
    - cron: '0 */6 * * *'            # safety auto-refresh every 6 hours (editor's "Publish now" is instant, so this is only a backstop)
permissions:
  contents: write                    # to commit the refreshed data.json
concurrency:
  group: "refresh-data"
  cancel-in-progress: true           # safe here: this job only commits a file, never deploys
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # Must be the *currently active* Web app /exec URL.
      # Apps Script > Deploy > Manage deployments > (Web app) > copy "Web app URL".
      # Required on that deployment:  Execute as = Me ,  Who has access = Anyone
      # ----------------------------------------------------------------------
      - name: Fetch data from the Sheet and commit if it changed
        env:
          APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbyUoOwvu32QbKPaLIueyJFFSqft0b7qoASYEImHE3Mj-kRBxphaLbm1yyuXigFfiDKDrw/exec"
        run: |
          set +e
          echo "Requesting data from Apps Script…"
          code=$(curl -sSL --max-time 60 -o data.fetched.json -w "%{http_code}" "$APPS_SCRIPT_URL")
          echo "HTTP status from Apps Script: $code"

          valid=0
          if [ "$code" = "200" ]; then
            python3 - <<'PY'
          import json, sys
          try:
              d = json.load(open("data.fetched.json"))
          except Exception as e:
              print("::error::Response was not JSON (a Google login / permission / error page).")
              print(open("data.fetched.json", encoding="utf-8", errors="replace").read()[:300]); sys.exit(1)
          if d.get("ok") is not True:
              print("::error::JSON received but missing ok:true."); sys.exit(1)
          print("OK — events:", len(d.get("events", [])), "people:", len(d.get("people", [])),
                "gallery:", len(d.get("gallery", [])), "hero:", len(d.get("hero", [])))
          PY
            [ $? -eq 0 ] && valid=1
          else
            echo "::error::Apps Script did not return 200 (got $code). 404=stale /exec URL, 401/403='Who has access' not Anyone."
          fi

          if [ "$valid" != "1" ]; then
            rm -f data.fetched.json
            echo "::warning::Could not refresh data — leaving the existing data.json untouched."
            exit 0
          fi

          if [ -f data.json ] && cmp -s data.fetched.json data.json; then
            rm -f data.fetched.json
            echo "Data is identical to what's already published — nothing to do."
            exit 0
          fi

          mv -f data.fetched.json data.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: refresh data snapshot"
          git push || (git pull --rebase && git push)
          echo "data.json updated and pushed. GitHub Pages will redeploy the site automatically."
