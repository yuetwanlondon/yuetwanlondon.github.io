<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16130F">
<link rel="icon" type="image/png" href="/img/yuetwanlondon-favicon.png">
<title>Yuet Wan London — Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,500;1,600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">
<style>
/* ===================================================================
   Editor chrome — sits on top of the shared site styles.
   Mobile-first comfort: big tap targets, safe-area aware, app-like.
   =================================================================== */
body{background:var(--mist)}
button,a,input,.ed-tools button{-webkit-tap-highlight-color:transparent}

/* ---- top app bar ---- */
.ebar{position:fixed;top:0;left:0;right:0;z-index:60;background:var(--ink);color:var(--paper);
  display:flex;align-items:center;gap:8px;
  height:calc(54px + env(safe-area-inset-top));padding:env(safe-area-inset-top) 12px 0;
  border-bottom:1px solid var(--line-d)}
.ebar .lg{font-family:var(--grot);font-weight:800;font-size:14px;letter-spacing:.01em;display:flex;align-items:center;white-space:nowrap}
.ebar .lg .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--vermilion);margin-right:8px}
.ebar .sp{flex:1}
.ebar button,.ebar a{font-family:var(--grot);font-size:13px;font-weight:600;border-radius:30px;
  padding:9px 15px;cursor:pointer;border:1px solid rgba(244,236,221,.22);background:transparent;color:var(--paper);
  text-decoration:none;display:inline-flex;align-items:center;gap:7px;line-height:1;white-space:nowrap}
.ebar .save{background:var(--jade);border-color:var(--jade)}
.ebar .save:disabled{opacity:.5;cursor:default}
.ebar .save.dirty{box-shadow:0 0 0 3px rgba(46,126,114,.3)}
.ebar .pub{background:var(--brass);border-color:var(--brass);color:var(--ink);font-weight:700}
.ebar .pub:disabled{opacity:.55;cursor:default}
.ebar .kebab{padding:0;width:42px;height:42px;justify-content:center;border-radius:13px}
.ebar .kebab svg{width:20px;height:20px}
.canvas{padding-top:calc(54px + env(safe-area-inset-top))}

/* ---- overflow menu (top-right sheet) ---- */
.menuscrim{position:fixed;inset:0;background:rgba(22,19,15,.35);z-index:64;opacity:0;pointer-events:none;transition:.18s}
.menuscrim.open{opacity:1;pointer-events:auto}
.menu{position:fixed;top:calc(54px + env(safe-area-inset-top) + 4px);right:10px;z-index:65;
  background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 18px 50px rgba(22,19,15,.22);
  padding:7px;min-width:210px;display:flex;flex-direction:column;gap:2px;
  opacity:0;transform:translateY(-8px) scale(.98);pointer-events:none;transition:.18s;transform-origin:top right}
.menu.open{opacity:1;transform:none;pointer-events:auto}
.menu button,.menu a{font-family:var(--grot);font-size:14.5px;font-weight:600;color:var(--ink);
  text-align:left;background:transparent;border:none;border-radius:11px;padding:13px 13px;cursor:pointer;
  display:flex;align-items:center;gap:12px;text-decoration:none;width:100%}
.menu button:hover,.menu a:hover{background:var(--mist)}
.menu svg{width:18px;height:18px;color:var(--ink-55);flex:none}
.menu .sepa{height:1px;background:var(--line);margin:5px 4px}
.menu .danger{color:var(--vermilion-d)}.menu .danger svg{color:var(--vermilion-d)}

.sec-wrap{padding:42px 0 0}
.sec-wrap.first{padding-top:26px}
.enav{position:sticky;top:calc(54px + env(safe-area-inset-top));z-index:55;display:flex;gap:7px;overflow-x:auto;overflow-y:hidden;white-space:nowrap;padding:12px 0 11px;margin:0 0 2px;background:var(--mist);scrollbar-width:none;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--line)}
.enav::-webkit-scrollbar{display:none}
.enav button{flex:none;font-family:var(--grot);font-size:13.5px;font-weight:600;color:var(--ink-70,#5f574d);background:#fff;border:1px solid var(--line);border-radius:30px;padding:9px 15px;cursor:pointer;transition:background .15s,color .15s,border-color .15s;line-height:1}
.enav button:hover{border-color:var(--ink-55)}
.enav button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.pane{display:none}
.pane.show{display:block}
.pane>.sec-wrap:first-child{padding-top:24px}
.gal .t{position:relative}
.gsecchip{position:absolute;top:6px;left:6px;background:rgba(22,19,15,.82);color:#fff;font-family:var(--grot);font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;max-width:calc(100% - 12px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.addbtn{font-family:var(--grot);font-size:13.5px;font-weight:600;color:var(--vermilion-d);background:#fff;border:1.5px dashed var(--vermilion);border-radius:12px;padding:12px 18px;cursor:pointer;margin-top:16px}
.addbtn:hover{background:#fbeae6}
.postlist{display:flex;flex-direction:column;gap:12px}
.post{display:flex;gap:14px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}
.post .pthumb{width:92px;height:70px;border-radius:10px;overflow:hidden;flex:none;background:var(--mist);display:flex;align-items:center;justify-content:center}
.post .pthumb img{width:100%;height:100%;object-fit:cover}
.post .pthumb .ph{opacity:.4}.post .pthumb .ph svg{width:30px;height:30px}
.post .pmeta{min-width:0}
.post .pmeta h4{font-family:var(--disp);font-size:16px;margin:2px 0 3px}
.post .pmeta p{color:var(--ink-55);font-size:13px;margin:0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.post .pd{font-family:var(--grot);font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--brass)}
.dbadge{background:var(--vermilion);color:#fff;border-radius:20px;padding:1px 8px;font-size:10.5px;margin-left:6px;letter-spacing:.02em}
.pcat{color:var(--brass,#B8893C);font-weight:600}
.syncbadge{display:inline-flex;align-items:center;gap:4px;background:var(--brass,#B8893C);color:#fff;border:none;border-radius:20px;padding:3px 10px;font-size:10.5px;font-weight:600;margin-left:8px;cursor:pointer;font-family:var(--grot);letter-spacing:.02em}
.syncbadge:hover{filter:brightness(1.08)}
.nl-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.nl-banner{background:rgba(184,137,60,.12);border:1px solid rgba(184,137,60,.35);color:#6d563a;border-radius:10px;padding:11px 14px;font-size:13px;line-height:1.5;margin-bottom:18px}
.nl-lbl{display:block;font-size:12px;font-weight:600;letter-spacing:.02em;color:#6d655c;margin:16px 0 7px;text-transform:uppercase}
.nl-in{width:100%;box-sizing:border-box;border:1px solid var(--line,#d9cdb8);border-radius:9px;padding:11px 13px;font-size:16px;font-family:inherit;margin-bottom:8px;background:#fff;color:#16130f}
.nl-in:focus{outline:none;border-color:#B8893C}
.nl-sub{font-size:12px;color:#9a8e79;margin:10px 0 4px}
.nl-chk{display:flex;align-items:center;gap:9px;font-size:14px;margin:9px 0;color:#3a2e22}
.nl-chk input[type=checkbox]{width:17px;height:17px;flex:0 0 auto;accent-color:#B8893C}
.nl-num{width:56px;margin-left:auto;border:1px solid var(--line,#d9cdb8);border-radius:7px;padding:6px 8px;font-size:15px;background:#fff}
.nl-actions{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.nl-btn-ui{border:1px solid #B8893C;background:#fff;color:#6d563a;border-radius:40px;padding:11px 22px;font-size:14px;cursor:pointer;font-family:inherit}
.nl-btn-ui.primary{background:#9a2f28;border-color:#9a2f28;color:#fff}
.nl-btn-ui:hover{filter:brightness(.97)}
select.nl-in{appearance:auto}
.nl-gate{margin-top:13px;background:rgba(154,47,40,.08);border:1px solid rgba(154,47,40,.25);color:#7a2a23;border-radius:9px;padding:10px 13px;font-size:13px;line-height:1.5}
.dig-card{margin-top:28px;border:1px solid var(--line,#e4dccb);border-radius:14px;padding:20px 22px;background:#fbf6ec}
.dig-head{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.dig-head h3{margin:0;font-size:16px;font-family:var(--grot)}
.dig-note{font-size:13px;color:#6d655c;line-height:1.55;margin:9px 0 14px}
.dig-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0 14px}
.dig-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.dig-status{margin-top:13px;font-size:12.5px;color:#5f584f;background:#f1e9d8;border-radius:8px;padding:10px 13px;line-height:1.55}
.dig-help{margin-top:13px;font-size:13px;color:#6d655c}
.dig-help summary{cursor:pointer;font-weight:600;color:#6d563a}
.dig-help ol{margin:9px 0 0;padding-left:20px;line-height:1.65}

.nl-prev{position:sticky;top:16px}
.nl-prevhead{font-size:12px;font-weight:600;letter-spacing:.02em;color:#6d655c;text-transform:uppercase;margin-bottom:8px}
.nl-subjline{font-size:12px;font-weight:400;text-transform:none;color:#9a8e79;margin-top:3px}
.nl-frame{width:100%;height:640px;border:1px solid var(--line,#d9cdb8);border-radius:12px;background:#f1e8d6}
@media(max-width:860px){.nl-wrap{grid-template-columns:1fr}.nl-prev{position:static}.nl-frame{height:560px}}

.vbadge{background:var(--ink);color:var(--paper);border-radius:20px;padding:1px 8px;font-size:10.5px;margin-left:6px}
.pempty{color:var(--ink-55);font-size:14px;padding:6px 2px}
.schip{width:54px;height:54px;border-radius:50%;flex:none;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
.schip svg{width:24px;height:24px;fill:currentColor}
.schip img{width:28px;height:28px;object-fit:contain}

/* ---- editable affordance + per-item tools ---- */
.ed{position:relative}
.ed::after{content:"";position:absolute;inset:0;border:2px dashed transparent;border-radius:16px;pointer-events:none;transition:.15s;z-index:4}
.ed:hover::after{border-color:var(--brass)}
.ed-tools{position:absolute;top:8px;right:8px;z-index:6;display:flex;gap:5px;opacity:0;transform:translateY(-4px);transition:.15s;pointer-events:none}
.ed:hover .ed-tools{opacity:1;transform:none;pointer-events:auto}
.ed-tools button{width:36px;height:36px;border-radius:10px;border:none;background:rgba(22,19,15,.92);color:var(--paper);display:grid;place-items:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.ed-tools button:hover,.ed-tools button:active{background:var(--vermilion)}
.ed-tools button svg{width:16px;height:16px}
.ev-grid>.ed>.ecard{height:100%}
.gal>.ed{position:relative}
.gal>.ed.extra{opacity:.5}
.gal>.ed.big{grid-column:span 2;grid-row:span 2}
.gal>.ed>.t{position:absolute;inset:0}
/* touch devices can't hover — keep the tools on screen so they're reachable */
@media (hover:none){
  .ed-tools{opacity:1;transform:none;pointer-events:auto}
  .ed-tools button{background:rgba(22,19,15,.82);backdrop-filter:blur(2px)}
}

/* hero in editor: static preview */
.hero.preview .slide{position:absolute;inset:0;opacity:0}
.hero.preview .slide.on{opacity:1}
.hero .dots{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:4;display:flex;gap:7px}
.hero .dots button{width:11px;height:11px;border-radius:50%;border:none;background:rgba(244,236,221,.45);cursor:pointer}
.hero .dots button.on{background:var(--paper)}

/* settings panel */
.setpanel{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}
.setrow{display:grid;grid-template-columns:200px 1fr;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line-2,#EFEAE0);align-items:center}
.setrow:last-child{border-bottom:none}
.setrow .k{font-family:var(--grot);font-size:12.5px;font-weight:700;color:var(--ink-80)}
.setrow .k small{display:block;font-weight:500;color:var(--ink-55);font-size:11px;margin-top:2px}
.setrow input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:16px;font-family:var(--grot)}
.settoggle{display:inline-flex;align-items:center;gap:11px;cursor:pointer}
.settoggle input{position:absolute;opacity:0;width:0;height:0}
.settoggle .track{width:46px;height:26px;border-radius:20px;background:#cfc6b6;position:relative;transition:.2s;flex:0 0 auto}
.settoggle input:checked + .track{background:var(--brass,#B8893C)}
.settoggle .track::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
.settoggle input:checked + .track::after{transform:translateX(20px)}
.settoggle .lab{font-family:var(--grot);font-size:13px;font-weight:700;color:var(--ink-80)}
.aud-bar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.aud-stats{font-size:14px;color:var(--ink-80)}
.aud-stats b{font-size:18px}
.aud-on{color:#2e7e72;font-weight:600}
.aud-off{color:#9a8e79}
.aud-btns{display:flex;gap:8px}
.aud-btn{border:1px solid var(--line);background:#fff;color:var(--ink-80);border-radius:40px;padding:8px 16px;font-size:13px;font-family:var(--grot);font-weight:600;cursor:pointer}
.aud-btn:hover{border-color:var(--brass)}
.aud-tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
.aud-table{width:100%;border-collapse:collapse;font-size:13.5px}
.aud-table th{text-align:left;font-family:var(--grot);font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-55);padding:11px 12px;border-bottom:1px solid var(--line);background:var(--mist);white-space:nowrap}
.aud-table td{padding:11px 12px;border-bottom:1px solid var(--line-2,#EFEAE0);vertical-align:middle}
.aud-table tbody tr:last-child td{border-bottom:none}
.aud-nm{font-weight:600;color:var(--ink)}
.aud-em{color:var(--ink-55);font-size:12.5px;text-decoration:none}
.aud-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.aud-badge.on{background:rgba(46,126,114,.14);color:#2e7e72}
.aud-badge.off{background:rgba(154,142,121,.18);color:#8a7d68}
.aud-act{white-space:nowrap;display:flex;gap:6px}
.aud-mini{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 10px;font-size:12px;font-family:var(--grot);cursor:pointer;color:var(--ink-80)}
.aud-mini:hover{border-color:var(--brass)}
.aud-mini.danger{color:#9a2f28}
.aud-mini.danger:hover{border-color:#9a2f28;background:rgba(154,47,40,.06)}
.aud-h2{display:flex;justify-content:space-between;align-items:center;margin:30px 0 12px}
.aud-h2 h3{margin:0;font-size:16px;font-family:var(--grot)}
.aud-conlist{display:flex;flex-direction:column;gap:10px}
.aud-con{border:1px solid var(--line);border-radius:11px;padding:13px 15px;background:#fff}
.aud-con-h{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.aud-date{margin-left:auto;color:var(--ink-55);font-size:12px}
.aud-msgtxt{margin-top:7px;font-size:14px;line-height:1.55;color:var(--ink-80);white-space:pre-wrap}
.aud-msg{padding:24px;text-align:center;color:var(--ink-55);font-size:14px}

.abrow{display:grid;grid-template-columns:190px 1fr;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line-2,#EFEAE0);align-items:start}
.abrow:last-child{border-bottom:none}
.abrow .k{font-family:var(--grot);font-size:12.5px;font-weight:700;color:var(--ink-80);padding-top:6px}
.abrow .k small{display:block;font-weight:500;color:var(--ink-55);font-size:11px;margin-top:2px}
.abrow .fields{display:flex;flex-direction:column;gap:7px}
.abrow .lab{font-family:var(--grot);font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--ink-55);text-transform:uppercase}
.abrow input,.abrow textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:16px;font-family:var(--grot);box-sizing:border-box}
.abrow textarea{min-height:64px;resize:vertical;line-height:1.5}
.setrow input:focus,.abrow input:focus,.abrow textarea:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(184,137,60,.16)}

/* ---- edit drawer (right panel on desktop, bottom sheet on mobile) ---- */
.dscrim{position:fixed;inset:0;background:rgba(22,19,15,.42);z-index:70;opacity:0;pointer-events:none;transition:.2s;touch-action:none}
.dscrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(600px,94vw);background:#fff;z-index:71;transform:translateX(100%);transition:transform .26s cubic-bezier(.22,.61,.36,1);display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.2)}
.drawer.open{transform:none}
.drawer .dh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
.drawer .dh h3{font-family:var(--disp);font-size:17px;margin:0;font-weight:800}
.drawer .db{padding:18px 20px;overflow:auto;flex:1;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.drawer .df{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;cursor:pointer;color:var(--ink-55)}
.iconbtn:hover{color:var(--ink);border-color:var(--brass)}.iconbtn svg{width:17px;height:17px}
.btn-sm{height:auto;padding:12px 18px;font-size:14px;border-radius:11px}
.fld{margin-bottom:16px}
.fld>label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-55);margin-bottom:7px}
.fld input[type=text],.fld input[type=number],.fld select,.fld textarea{width:100%;border:1px solid var(--line);border-radius:11px;padding:12px 13px;font-size:16px;font-family:var(--grot)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(184,137,60,.16)}
.fld textarea{min-height:84px;resize:vertical;line-height:1.55}
.fld .cjk-in{font-family:var(--cjk)}
.bi{display:grid;grid-template-columns:1fr;gap:14px}
.bi .t{font-size:10px;color:var(--ink-55);margin-bottom:4px;font-weight:600;letter-spacing:.03em}
.chk{display:flex;align-items:center;gap:10px;font-size:14.5px}.chk input{width:20px;height:20px}
.imgbox{display:flex;gap:13px}
.imgbox .pv{width:92px;height:92px;border-radius:12px;border:1px solid var(--line);background:var(--mist);overflow:hidden;flex:0 0 auto;display:grid;place-items:center;color:var(--ink-55);font-size:11px}
.imgbox .pv img{width:100%;height:100%;object-fit:cover}
.imgbox .ic{flex:1;min-width:0}.imgbox .ic input{margin-bottom:8px}
.filebtn{position:relative;overflow:hidden;display:inline-block}
.filebtn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

/* ---- login ---- */
.login{min-height:100svh;display:grid;place-items:center;padding:24px;
  padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom))}
.login .card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:34px 30px;width:100%;max-width:380px;box-shadow:0 24px 70px rgba(22,19,15,.1)}
.login .mark{width:48px;height:48px;border-radius:14px;background:var(--ink);display:grid;place-items:center;margin:0 auto 18px}
.login .mark .dot{width:11px;height:11px;border-radius:50%;background:var(--vermilion)}
.login h1{font-size:21px;margin:0 0 4px;font-weight:800;text-align:center}
.login .lead{color:var(--ink-55);font-size:14px;margin:0 0 24px;text-align:center}
.login .fld{margin-bottom:15px}
.login label{display:block;font-size:11.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-55);margin-bottom:7px}
.login input{width:100%;border:1px solid var(--line);border-radius:12px;padding:14px 14px;font-size:16px;font-family:var(--grot);background:#fff;color:var(--ink);box-sizing:border-box}
.login input:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(184,137,60,.18)}
.pwwrap{position:relative}
.pwwrap input{padding-right:48px}
.pwtog{position:absolute;top:50%;right:6px;transform:translateY(-50%);width:38px;height:38px;border:none;background:transparent;color:var(--ink-55);display:grid;place-items:center;cursor:pointer;border-radius:9px}
.pwtog:hover{color:var(--ink);background:var(--mist)}
.pwtog svg{width:21px;height:21px}
.login .err{color:var(--vermilion-d);font-size:13px;min-height:18px;margin-top:2px}
.login .btn{height:52px}
.login .hint{color:var(--ink-55);font-size:11.5px;text-align:center;margin:10px 0 0}

/* ---- toast / busy ---- */
.toast{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:13px 22px;border-radius:40px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:90;pointer-events:none;max-width:calc(100vw - 32px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.busy{position:fixed;inset:0;background:rgba(246,243,238,.55);z-index:80;display:none;place-items:center}
.busy.on{display:grid}
.spin{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--vermilion);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.hint{color:var(--ink-55);font-size:13px;margin:-14px 0 4px}

/* ---- google-doc picker ---- */
.doclist{padding:14px 16px;overflow:auto;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.docrow{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;font-family:var(--grot)}
.docrow:hover{border-color:var(--vermilion);box-shadow:0 6px 18px rgba(0,0,0,.08)}
.docrow .dn{display:flex;align-items:center;gap:10px;min-width:0;font-size:15px;font-weight:600;color:var(--ink)}
.docrow .dn>svg{width:18px;height:18px;color:var(--brass);flex:none}
.docrow .dn>span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.docrow .dd{font-size:12px;color:var(--ink-55);flex:none}
/* ---- image picker ---- */
.pickwrap{position:fixed;inset:0;z-index:80;background:rgba(22,19,15,.5);display:none;align-items:center;justify-content:center;padding:24px}
.pickwrap.open{display:flex}
.pickbox{background:#fff;border-radius:18px;width:min(740px,95vw);max-height:84vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.3)}
.pickhd{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
.pickhd b{font-family:var(--disp);font-size:16px}
.pickgrid{padding:16px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.pickgrid .pk{aspect-ratio:1/1;border-radius:11px;overflow:hidden;border:1px solid var(--line);cursor:pointer;background:var(--mist)}
.pickgrid .pk img{width:100%;height:100%;object-fit:cover}
.pickgrid .pk:hover{border-color:var(--vermilion);box-shadow:0 6px 18px rgba(0,0,0,.12)}
.pickempty{padding:34px;text-align:center;color:var(--ink-55);grid-column:1/-1}

/* =====================================================================
   Mobile (<=760px): bottom-sheet drawer, stacked rows, full-width actions
   ===================================================================== */
@media (max-width:760px){
  .wrap{padding:0 16px}
  .sec-wrap{padding-top:32px}
  .sec-wrap.first{padding-top:20px}
  .slabel{margin-bottom:18px;gap:12px}

  /* keep the bar to the essentials */
  .ebar{gap:7px;padding-left:12px;padding-right:10px}
  .ebar .lg{font-size:13.5px}
  .ebar button,.ebar a{font-size:12.5px;padding:9px 13px}
  .ebar .kebab{width:40px;height:40px}

  .addbtn{width:100%;text-align:center;padding:15px}

  /* edit tools a touch larger and easier to hit */
  .ed-tools button{width:38px;height:38px}

  /* drawer becomes a bottom sheet */
  .drawer{top:auto;left:0;right:0;bottom:0;width:100%;max-height:92svh;border-radius:22px 22px 0 0;
    transform:translateY(100%);box-shadow:0 -18px 50px rgba(0,0,0,.3)}
  .drawer.open{transform:none}
  .drawer .dh{padding:20px 20px 16px;position:relative}
  .drawer .dh::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:40px;height:4px;border-radius:3px;background:var(--line)}
  .drawer .db{padding-bottom:calc(20px + env(safe-area-inset-bottom))}
  .drawer .df{padding:14px 20px calc(14px + env(safe-area-inset-bottom))}
  .df .btn{flex:1;justify-content:center}

  /* stack bilingual + key/value rows */
  .bi{grid-template-columns:1fr}
  .setrow{grid-template-columns:1fr;gap:8px;padding:16px 16px}
  .abrow{grid-template-columns:1fr;gap:9px;padding:16px 16px}
  .abrow .k{padding-top:0}

  /* picker as a bottom sheet */
  .pickwrap{padding:0;align-items:flex-end}
  .pickbox{width:100%;max-height:88svh;border-radius:20px 20px 0 0}
  .pickgrid{grid-template-columns:repeat(auto-fill,minmax(98px,1fr));padding-bottom:calc(16px + env(safe-area-inset-bottom))}
}
@media (max-width:380px){
  .ebar .lg span:not(.dot){display:none}      /* very narrow: keep just the mark */
  .ebar .save,.ebar .pub{padding:9px 12px}
}

/* ---- rich-text field + formatting toolbar ---- */
#s_about .rtbar{top:calc(54px + env(safe-area-inset-top) + 64px)}
.rich{width:100%;min-height:46px;border:1px solid var(--line);border-radius:11px;padding:12px 13px;font-size:16px;font-family:var(--grot);line-height:1.55;box-sizing:border-box;background:#fff;overflow-wrap:anywhere}
#f_body_en,#f_body_zh{min-height:180px}
#f_summary_en,#f_summary_zh{min-height:84px}
.rich:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(184,137,60,.16)}
.rich:empty:before{content:attr(data-ph);color:var(--ink-55);pointer-events:none}
.rich.cjk-in{font-family:var(--cjk)}
.rtbar{position:sticky;top:0;z-index:8;display:flex;flex-wrap:wrap;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px;margin-bottom:16px}
.rtbar button{height:32px;min-width:32px;padding:0 8px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.rtbar button:hover{border-color:var(--brass)}
.rtbar button svg{width:16px;height:16px;fill:none;stroke:currentColor}
.rtbar .sw{width:26px;min-width:26px;height:26px;padding:0;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
.rtbar .sw:hover{box-shadow:0 0 0 2px var(--brass)}
.rtbar .rtsep{width:1px;height:22px;background:var(--line);margin:0 3px}
.rtbar .lbl{font-family:var(--grot);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-55);margin:0 2px}
:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
</style>

const EYE_ON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';

const $=id=>document.getElementById(id);
let AUTH=null, DATA={events:[],people:[],gallery:[],hero:[],settings:[],learn:[],news:[],social:[],about:[]}, LANG="en", DIRTY=new Set(), HSEL=0, EDIT={tab:null,i:-1}, DOC_MTIME={};
const E=YW.esc, T=YW.isTrue, LN=YW.lines;
function Lf(o,b){return LANG==="zh"?(o[b+"_zh"]||o[b+"_en"]||""):(o[b+"_en"]||o[b+"_zh"]||"");}
function busy(on){$("busy").classList.toggle("on",on);}
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}
function mark(tab){DIRTY.add(tab);const b=$("saveBtn");b.disabled=false;b.textContent="Save changes";b.classList.add("dirty");}

/* ---------- auth ---------- */
async function login(){
  const user=$("luser").value.trim(), pass=$("lpass").value;
  if(!user||!pass){$("lerr").textContent="Enter your username and password.";return;}
  busy(true);
  try{ const res=await YW.post({action:"login",user,pass});
    if(res&&res.ok){AUTH={user,pass};sessionStorage.setItem("yw_auth",JSON.stringify(AUTH));await boot();}
    else $("lerr").textContent="Incorrect username or password.";
  }catch(e){$("lerr").textContent="Couldn't reach the server — check the deployment.";}
  busy(false);
}
async function boot(){
  busy(true);
  try{
    const j=await YW.fetchLive();
    ["events","people","gallery","hero","settings","learn","news","social","about"].forEach(k=>DATA[k]=(j&&j[k])?j[k]:[]);
    if(!DATA.settings.length) DATA.settings=SETKEYS.map(s=>({key:s.key,value:"",note:s.note}));
    Object.keys(DATA).forEach(k=>DATA[k].sort((a,b)=>(+a.order||0)-(+b.order||0)));
    $("loginView").classList.add("hidden"); $("appView").classList.remove("hidden");
    renderAll();
    checkDocUpdates();
  }catch(e){toast("Could not load data.");}
  busy(false);
}

/* ---------- photo / card helpers (match the site) ---------- */
function initials(p){return String(p.name_en||"").split(/\s+/).filter(Boolean).map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function photo(p,big){ if(p.photo) return `<img class="cover" src="${E(p.photo)}" alt="">`; const i=initials(p); return `<div class="place">${YW.lat()}${i?`<span class="init">${i}</span>`:`<span class="usr">${YW.USER_ICON}</span>`}</div>`; }
function tools(tab,i){return `<div class="ed-tools">
  <button data-op="up" title="Move up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>

var CAMPAIGN={subj_en:"",subj_zh:"",intro_en:"",intro_zh:"",incEvents:true,evN:2,incArticles:true,artN:3,langMode:"both",segment:"all"};
var NL_LOGO="https://yuetwanlondon.com/img/email-logo.png";

function nlUpcomingEvents(n){
  var list=(DATA.events||[]).filter(function(e){ return String(e.status||"").toLowerCase()!=="past" && !YW.isPast(e); });
  list.sort(function(a,b){ return String(a.date_start||"").localeCompare(String(b.date_start||"")); });
  return list.slice(0,Math.max(0,n));
}
function nlLatestArticles(n){
  var a=(DATA.learn||[]).map(function(p){ return {p:p,sec:"blog"}; })
        .concat((DATA.news||[]).map(function(p){ return {p:p,sec:"news"}; }));
  a=a.filter(function(o){ return String(o.p.status||"").toLowerCase()!=="draft"; });
  a.sort(function(x,y){ return String(y.p.date||"").localeCompare(String(x.p.date||"")); });
  return a.slice(0,Math.max(0,n));
}
function nlEsc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function nlPlain(html){
  if(html==null) return "";
  var s=String(html);
  if(s.indexOf("<")<0 && s.indexOf("&")<0) return nlEsc(s);
  var d=document.createElement("div");
  d.innerHTML=s.replace(/<br\s*\/?>/gi,"\n").replace(/<\/(p|div|li)>/gi,"\n");
  var txt=(d.textContent||"").replace(/\u00a0/g," ").replace(/\n{2,}/g,"\n").replace(/[ \t]+/g," ").replace(/^\n+|\n+$/g,"").trim();
  return nlEsc(txt).replace(/\n/g,"<br>");
}
function nlSocialLinks(){
  var names={facebook:"Facebook",instagram:"Instagram",youtube:"YouTube",rednote:"Rednote",whatsapp:"WhatsApp",x:"X",tiktok:"TikTok",linkedin:"LinkedIn",pinterest:"Pinterest"};
  var list=(DATA.social||[]).slice().sort(function(a,b){return (+a.order||0)-(+b.order||0);});
  var links=list.filter(function(s){return s.url&&names[String(s.platform||"").toLowerCase()];}).map(function(s){
    return '<a href="'+nlEsc(s.url)+'" style="color:#c9a45e;text-decoration:none;font-size:12.5px;letter-spacing:.04em">'+names[String(s.platform).toLowerCase()]+'</a>';
  });
  if(!links.length) return "";
  return '<div style="margin:0 0 15px">'+links.join('<span style="color:#5a5040">&nbsp;&nbsp;·&nbsp;&nbsp;</span>')+'</div>';
}

// Build the email. o.langMode: "both" | "en" | "zh". Leaves {{name}}/{{unsub}} unless supplied.

  var unsub=(o.unsub!=null)?o.unsub:"{{unsub}}";
  var evs=o.incEvents?nlUpcomingEvents(o.evN||0):[];
  var arts=o.incArticles?nlLatestArticles(o.artN||0):[];
  function secHead(t){ return '<div style="font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#b8893c;font-weight:700;margin:28px 0 2px;font-family:Georgia,serif">'+t+'</div>'; }
  function block(lang){
    var greet = (lang==="zh") ? (name+" 您好，") : ("Dear "+name+",");
    var intro = (lang==="zh") ? (o.intro_zh||"") : (o.intro_en||"");
    var h='<p style="font-size:15px;margin:0 0 14px;color:#2b2118">'+nlEsc(greet)+'</p>'

  }
  var inner;
  if(mode==="en") inner=block("en");
  else if(mode==="zh") inner=block("zh");
  else inner=block("en")+'<div style="border-top:1px solid #e2d4ba;margin:32px 0 26px"></div>'+block("zh");
  var fUns=(mode==="zh")?"取消訂閱":(mode==="en")?"Unsubscribe":"Unsubscribe · 取消訂閱";
  var wordmark2='<div style="font-size:14px;color:#e7dcc6;margin-top:4px;letter-spacing:.08em">倫敦粵韻曲藝文化協會</div>';
  return '<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light only"></head>'
    +'<body style="margin:0;padding:0;background:#ece2cf;font-family:Georgia,serif;color:#2b2118;-webkit-text-size-adjust:100%">'

async function audSetStatus(payload){
  var i=payload.lastIndexOf("|"); var email=payload.slice(0,i), status=payload.slice(i+1);
  try{
    var res=await YW.post({action:"subStatus",pass:AUTH.pass,email:email,status:status});
    if(res&&res.ok){ (AUD.subscribers||[]).forEach(function(s){ if(String(s.Email).toLowerCase()===email.toLowerCase()){ s.Status=status; s.Unsubscribed=(status==="unsubscribed")?new Date().toISOString().slice(0,10):""; } }); drawAudience($("s_audience")); }
  }catch(e){}
}
async function audRemove(email){
  if(!confirm("Remove "+email+" from the list permanently? This deletes their row from the sheet.")) return;
  try{
    var res=await YW.post({action:"subRemove",pass:AUTH.pass,email:email});
    if(res&&res.ok){ AUD.subscribers=(AUD.subscribers||[]).filter(function(s){return String(s.Email).toLowerCase()!==email.toLowerCase();}); drawAudience($("s_audience")); }
  }catch(e){}
}
async function audRemoveContact(i){
  var c=(AUD.contacts||[])[i]; if(!c) return;
  if(!confirm("Delete this enquiry from "+(c.Name||c.Email||"this person")+"? This removes it from the sheet.")) return;
  try{
    var res=await YW.post({action:"conRemove",pass:AUTH.pass,email:c.Email,message:c.Message});
    if(res&&res.ok){ AUD.contacts.splice(i,1); drawAudience($("s_audience")); }
  }catch(e){}
}
function csvOf(rows,cols){
  function esc(v){ return '"'+String(v==null?"":v).replace(/"/g,'""')+'"'; }
  var out=[cols.map(esc).join(",")];
  (rows||[]).forEach(function(r){ out.push(cols.map(function(c){return esc(r[c]);}).join(",")); });
  return out.join("\r\n");
}
function downloadCsv(name,csv){
  try{
    var blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); },120);
  }catch(e){}
}

let RICH_ACTIVE=null;
function wireRichBar(scope){
  scope=scope||$("dBody");
  scope.querySelectorAll(".rich").forEach(ed=>{
    histInit(ed);
    ed.addEventListener("focusin",()=>{RICH_ACTIVE=ed;});
    ed.addEventListener("input",()=>{ const h=RT_HIST.get(ed); if(!h)return; clearTimeout(h.t); h.t=setTimeout(()=>histPush(ed),250); });
    ed.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); document.execCommand("insertLineBreak"); }});
  });
  const bar=scope.querySelector(".rtbar"); if(!bar) return;
  bar.addEventListener("pointerdown",e=>{
    const b=e.target.closest("button"); if(!b) return;
    e.preventDefault();                       // keep the editor's text selection
    const ed=RICH_ACTIVE; if(!ed) return;
    const cmd=b.dataset.cmd;
    if(cmd==="undo"){ histUndo(ed); return; }
    if(cmd==="redo"){ histRedo(ed); return; }
    histPush(ed);                             // snapshot before the change
    if(cmd==="bold") richWrap("strong",null);
    else if(cmd==="light") richWrap("span",{fontWeight:"300"});
    else if(cmd==="clear") richClear();
    else if(b.dataset.color) richWrap("span",{color:b.dataset.color});
    else if(b.dataset.hl) richWrap("span",{backgroundColor:b.dataset.hl});
    histPush(ed);                             // snapshot the result
  });
}
/* per-field undo/redo history (covers typing AND the style buttons, which the
   browser's native undo stack does not track because they mutate the DOM directly) */
const RT_HIST=new WeakMap();
function histInit(ed){ RT_HIST.set(ed,{stack:[ed.innerHTML],i:0,t:null}); }
function histPush(ed){
  const h=RT_HIST.get(ed); if(!h) return;
  const cur=ed.innerHTML; if(h.stack[h.i]===cur) return;
  h.stack=h.stack.slice(0,h.i+1); h.stack.push(cur);
  if(h.stack.length>200) h.stack.shift();
  h.i=h.stack.length-1;
}
function histUndo(ed){ const h=RT_HIST.get(ed); if(!h||h.i<=0) return; h.i--; ed.innerHTML=h.stack[h.i]; caretEnd(ed); }
function histRedo(ed){ const h=RT_HIST.get(ed); if(!h||h.i>=h.stack.length-1) return; h.i++; ed.innerHTML=h.stack[h.i]; caretEnd(ed); }
function caretEnd(ed){ ed.focus(); const r=document.createRange(); r.selectNodeContents(ed); r.collapse(false); const s=window.getSelection(); s.removeAllRanges(); s.addRange(r); }
function richSel(){
  const ed=RICH_ACTIVE; if(!ed) return null;
  const sel=window.getSelection(); if(!sel.rangeCount) return null;
  const range=sel.getRangeAt(0);
  if(range.collapsed || !ed.contains(range.commonAncestorContainer)) return null;
  return {sel,range};
}
function richWrap(tag,css){
  const c=richSel(); if(!c) return;
  const el=document.createElement(tag);
  if(css) Object.keys(css).forEach(k=>{ el.style[k]=css[k]; });
  try{ el.appendChild(c.range.extractContents()); c.range.insertNode(el); }catch(e){ return; }
  c.sel.removeAllRanges(); const r=document.createRange(); r.selectNodeContents(el); c.sel.addRange(r);
}
function richClear(){
  const ed=RICH_ACTIVE; if(!ed) return;
  let c=richSel();
  if(!c){ const sel=window.getSelection(), range=document.createRange(); range.selectNodeContents(ed); sel.removeAllRanges(); sel.addRange(range); c={sel,range}; }
  const box=document.createElement("div"); box.appendChild(c.range.extractContents());
  box.querySelectorAll("*").forEach(el=>{ if(el.tagName==="BR") return; while(el.firstChild) el.parentNode.insertBefore(el.firstChild,el); el.parentNode.removeChild(el); });
  const frag=document.createDocumentFragment(); while(box.firstChild) frag.appendChild(box.firstChild);
  c.range.insertNode(frag);
}

async function galleryBulk(fileList){

function liftDocTitle(post, lang){
  var tk="title_"+lang, bk="body_"+lang;
  if(post[tk] && String(post[tk]).trim()) return;          // Doc already gave us a title
  var body=String(post[bk]||""); if(!body) return;
  var parts=body.split(/<br\s*\/?>/i);
  var first=(parts[0]||"").trim();
  var m=first.match(/^<strong>([\s\S]*)<\/strong>$/i);   // a Title/Heading-styled first line is bold-only
  if(!m) return;
  var t=YW.plain(m[1]); if(!t) return;
  post[tk]=t;
  post[bk]=parts.slice(1).join("<br>").replace(/^(\s*<br\s*\/?>\s*)+/i,"");
}
function deriveSummary(bodyHtml, maxLatin, maxCJK){
  if(!bodyHtml) return "";
  var lines=YW.richLines(bodyHtml), para="", fallback="";
  for(var i=0;i<lines.length;i++){
    if(/^\s*<table/i.test(lines[i])) continue;
    var t=YW.plain(lines[i]); if(!t) continue;
    if(!fallback) fallback=t;
    if(/^<strong>[^<]*<\/strong>$/i.test(lines[i].trim())) continue;
    para=t; break;
  }
  if(!para) para=fallback;
  if(!para) return "";
  var cjk=/[\u4e00-\u9fff]/.test(para), max=cjk?maxCJK:maxLatin;
  if(para.length>max){ para=para.slice(0,max); if(!cjk) para=para.replace(/\s+\S*$/,""); para=para.replace(/[\s,;:.!?\uFF0C\uFF1B\uFF1A\u3002\uFF01\uFF1F\u3001]+$/,"")+"\u2026"; }
  return para;
}
async function importDocById(section, docId){
  busy(true);
  try{
    const res=await YW.post({action:"import",pass:AUTH.pass,url:docId,section:section});
    if(!res||!res.ok||!res.post) throw new Error(res&&res.error||"import failed");
    const post=res.post;
    liftDocTitle(post,"en"); liftDocTitle(post,"zh");   // styled Doc title -> Title box (was landing in the body)
    if(!post.summary_en && post.body_en) post.summary_en=deriveSummary(post.body_en,180,90);
    if(!post.summary_zh && post.body_zh) post.summary_zh=deriveSummary(post.body_zh,180,80);
    post.doc_id=String(docId||"");
    // If this exact Doc was imported before, UPDATE that post instead of adding a duplicate.
    var idx = post.doc_id ? DATA[section].findIndex(function(r){return String(r.doc_id||"")===post.doc_id;}) : -1;
    if(idx>=0){
      var prev=DATA[section][idx];
      prev.title_en=post.title_en;     prev.title_zh=post.title_zh;
      prev.summary_en=post.summary_en; prev.summary_zh=post.summary_zh;
      prev.body_en=post.body_en;       prev.body_zh=post.body_zh;
      prev.doc_id=post.doc_id; prev.imported_at=Date.now();
      // status, date, cover, video, images and category are kept as set in the editor.
      mark(section); renderAll(); busy(false);
      toast("Updated this post from the Doc — review, then Save & Publish.");
      openDrawer(section, idx);
    } else {
      post.order=DATA[section].reduce((m,r)=>Math.max(m,+r.order||0),0)+1;
      post.imported_at=Date.now();
      DATA[section].push(post);
      mark(section); renderAll(); busy(false);
      toast("Imported — review it below, then Save & Publish.");
      openDrawer(section, DATA[section].length-1);
    }
  }catch(e){ busy(false); alert("Import failed: "+e.message); }
}

/* ---------- per-item Drive folder: uploads go to "<section>/<id>" ---------- */
function curItemId(){
  const el=$("f_id");
  let id=(el&&el.value)?el.value:((DATA[EDIT.tab]&&DATA[EDIT.tab][EDIT.i])?DATA[EDIT.tab][EDIT.i].id:"");
  id=String(id||"").replace(/[^a-zA-Z0-9_-]/g,"");
  return id||"misc";
}
function uploadFolder(){ return EDIT.tab==="gallery" ? "gallery" : EDIT.tab+"/"+curItemId(); }

/* ---------- client-side image compression (shrinks before upload to save Drive space) ---------- */
const IMG_MAX_EDGE = 2000;                 // longest side in px — plenty sharp for hero / full-bleed
const IMG_QUALITY  = 0.82;                 // JPEG quality — high quality, much smaller files
const IMG_PASSTHRU = /(svg\+xml|gif)/i;    // leave vector + animated formats untouched

function readDataURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}
function loadImg(src){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src;});}
function fmtBytes(n){return n>=1048576?(n/1048576).toFixed(1)+" MB":Math.max(1,Math.round(n/1024))+" KB";}

async function compressImage(file){
  if(IMG_PASSTHRU.test(file.type||"")){               // SVG / GIF -> upload untouched
    return {data:await readDataURL(file),name:file.name,type:file.type,bytes:file.size};
  }
  const srcURL=await readDataURL(file);
  let img;
  try{ img=await loadImg(srcURL); }
  catch(e){ return {data:srcURL,name:file.name,type:file.type,bytes:file.size}; }   // can't decode -> original
  let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  const scale=Math.min(1, IMG_MAX_EDGE/Math.max(w,h));
  w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
  const c=document.createElement("canvas"); c.width=w; c.height=h;
  const ctx=c.getContext("2d");
  ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,w,h);     // flatten any transparency onto white
  ctx.imageSmoothingQuality="high"; ctx.drawImage(img,0,0,w,h);
  let out;
  try{ out=c.toDataURL("image/jpeg",IMG_QUALITY); }
  catch(e){ return {data:srcURL,name:file.name,type:file.type,bytes:file.size}; }
  const bytes=Math.round((out.length-(out.indexOf(",")+1))*3/4);
  if(bytes>=file.size && !/png/i.test(file.type||"")){ // already-tiny jpeg got bigger -> keep original
    return {data:srcURL,name:file.name,type:file.type,bytes:file.size};
  }
  const base=(file.name||"image").replace(/\.[^.]+$/,"")||"image";
  return {data:out,name:base+".jpg",type:"image/jpeg",bytes:bytes};
}

async function onFile(inp){
  const files=Array.prototype.slice.call(inp.files||[]); if(!files.length) return;
  const k=inp.dataset.k, multi=inp.dataset.multi==="1"; busy(true);
  let ok=0, fail=0, savedTotal=0, origTotal=0; const failNames=[];
  for(let n=0;n<files.length;n++){
    const f=files[n];
    if(files.length>1) toast(`Uploading ${n+1} of ${files.length}…`);
    try{
      const img=await compressImage(f);
      const res=await YW.post({action:"upload",pass:AUTH.pass,filename:img.name,mimeType:img.type,data:img.data,folder:uploadFolder()});
      if(!res||!res.ok||!res.url) throw new Error(res&&res.error||"upload failed");
      if(multi){ const ta=$("f_"+k); ta.value=(ta.value.trim()?ta.value.trim()+"\n":"")+res.url; }
      else{ $("f_"+k).value=res.url; const box=$("f_"+k).closest(".imgbox").querySelector(".pv"); if(box) box.innerHTML=`<img src="${res.url}">`; }
      ok++; savedTotal+=img.bytes; origTotal+=f.size;
    }catch(e){ fail++; failNames.push(f.name||("image "+(n+1))); }
  }
  IMG_CACHE={};
  if(!fail) toast(files.length>1 ? `Uploaded ${ok} images — ${fmtBytes(origTotal)} → ${fmtBytes(savedTotal)}` : `Uploaded — ${fmtBytes(origTotal)} → ${fmtBytes(savedTotal)}`);
  else if(ok) toast(`Uploaded ${ok} of ${files.length} — ${fail} failed (${failNames.slice(0,3).join(", ")})`);
  else alert("Upload failed: "+failNames.join(", "));
  inp.value=""; busy(false);
}

/* ---------- image library picker ---------- */
let PICK={key:null,multi:false}, IMG_CACHE={};
async function loadImages(folder){ if(IMG_CACHE[folder])return IMG_CACHE[folder]; const res=await YW.post({action:"images",pass:AUTH.pass,folder:folder}); if(res&&res.ok&&res.images){IMG_CACHE[folder]=res.images;return res.images;} throw new Error(res&&res.error||"could not list images"); }
function openPicker(key,multi){
  PICK={key,multi}; const folder=uploadFolder(); const g=$("pickGrid"); g.innerHTML='<div class="pickempty">Loading…</div>'; $("pickwrap").classList.add("open"); if(window.YW&&YW.lockScroll)YW.lockScroll(true);
  loadImages(folder).then(imgs=>{
    if(!imgs.length){ g.innerHTML='<div class="pickempty">No images uploaded to this section yet. Use “Upload” to add one.</div>'; return; }
    g.innerHTML=imgs.map(im=>`<div class="pk" data-url="${E(im.url)}" title="${E(im.name)}"><img src="${E(im.url)}" loading="lazy" alt=""></div>`).join("");
    g.querySelectorAll(".pk").forEach(el=>el.onclick=()=>choosePick(el.dataset.url));
  }).catch(err=>{ g.innerHTML='<div class="pickempty">Could not load images.<br><small>'+E(String(err.message||err))+'</small></div>'; });
}
function choosePick(url){
  const key=PICK.key;
  if(PICK.multi){ const ta=$("f_"+key); ta.value=(ta.value.trim()?ta.value.trim()+"\n":"")+url; }
  else{ const inp=$("f_"+key); inp.value=url; const box=inp.closest(".imgbox").querySelector(".pv"); if(box)box.innerHTML=`<img src="${url}">`; }
  closePicker();
}
function applyDrawer(){
  const r=DATA[EDIT.tab][EDIT.i];
  SCHEMA[EDIT.tab].fields.forEach(f=>{
    if((f.t==="bi"||f.t==="bitext")&&f.rich){ r[f.k+"_en"]=readRich("f_"+f.k+"_en"); r[f.k+"_zh"]=readRich("f_"+f.k+"_zh"); }
    else if(f.t==="bi"||f.t==="bitext"){ r[f.k+"_en"]=($("f_"+f.k+"_en")||{}).value||""; r[f.k+"_zh"]=($("f_"+f.k+"_zh")||{}).value||""; }
    else if(f.t==="bool"){ r[f.k]=$("f_"+f.k).checked?"TRUE":"FALSE"; }
    else { r[f.k]=($("f_"+f.k)||{}).value||""; }
  });
  mark(EDIT.tab); closeDrawer(); renderAll();
}

/* ---------- save ---------- */
async function saveAll(){
  if(!DIRTY.size) return;
  busy(true); let ok=true;
  for(const tab of Array.from(DIRTY)){
    try{ const res=await YW.post({action:"save",tab:SCHEMA[tab]?SCHEMA[tab].tab:tab[0].toUpperCase()+tab.slice(1),rows:DATA[tab],pass:AUTH.pass});
      if(!res||!res.ok){ok=false;} }catch(e){ok=false;}
  }
  busy(false);
  if(ok){ DIRTY.clear(); const b=$("saveBtn"); b.classList.remove("dirty"); b.textContent="Saved"; b.disabled=true; toast("Saved ✓  Click Publish to make it live."); }
  else toast("Some changes didn't save — try again.");
}

/* ---------- publish (rebuild the live site) ---------- */
async function publishNow(){
  const b=$("publishBtn"); const old=b.textContent; b.disabled=true; b.textContent="Publishing…";
  try{
    const res=await YW.post({action:"publish",pass:AUTH.pass});
    if(res&&res.ok){ toast("Publishing — your site updates in about a minute."); }
    else{ toast("Publish failed: "+((res&&res.error)||"unknown")); }
  }catch(e){ toast("Publish failed — check your connection."); }
  b.disabled=false; b.textContent=old;
}

/* ---------- top-bar menu ---------- */
function closeMenu(){ $("menu").classList.remove("open"); $("menuScrim").classList.remove("open"); }
function toggleMenu(){ const open=$("menu").classList.toggle("open"); $("menuScrim").classList.toggle("open",open); }

$("lbtn").onclick=login;
$("luser").addEventListener("keydown",e=>{if(e.key==="Enter")$("lpass").focus();});
$("lpass").addEventListener("keydown",e=>{if(e.key==="Enter")login();});

  const i=$("lpass"), hidden=i.type==="password";
  i.type=hidden?"text":"password";
  this.setAttribute("aria-label",hidden?"Hide password":"Show password");

  i.focus();
};
$("clearCacheBtn").onclick=async function(){ const b=$("clearCacheBtn"); b.disabled=true; b.textContent="Clearing…"; await YW.clearCache(); toast("Cache cleared"); setTimeout(function(){location.reload(true);},700); };

$("menuBtn").onclick=toggleMenu;
$("menuScrim").onclick=closeMenu;
$("langItem").onclick=()=>{ LANG=LANG==="en"?"zh":"en"; renderAll(); closeMenu(); };
$("viewItem").onclick=closeMenu;
$("cacheItem").onclick=async()=>{ closeMenu(); busy(true); await YW.clearCache(); busy(false); toast("Cache cleared — reloading"); setTimeout(()=>location.reload(true),700); };
$("logoutItem").onclick=()=>{ sessionStorage.removeItem("yw_auth"); location.reload(); };

$("saveBtn").onclick=saveAll;
$("publishBtn").onclick=publishNow;
$("dClose").onclick=closeDrawer; $("dCancel").onclick=closeDrawer; $("dApply").onclick=applyDrawer;
$("dscrim").onclick=closeDrawer;
$("pickClose").onclick=closePicker;
$("docpickClose").onclick=closeDocPicker;
$("docpickwrap").onclick=e=>{if(e.target.id==="docpickwrap")closeDocPicker();};
$("pickwrap").onclick=e=>{if(e.target.id==="pickwrap")closePicker();};
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ closeMenu(); closeDrawer(); closePicker(); closeDocPicker(); } });
window.addEventListener("beforeunload",e=>{ if(DIRTY.size){ e.preventDefault(); e.returnValue=""; } });
(function(){ const a=sessionStorage.getItem("yw_auth"); if(a){ AUTH=JSON.parse(a); boot(); } })();
